<mat-sidenav-container class="app-container">
  <mat-sidenav mode="side" opened class="app-sidenav">
    <mat-nav-list>
      <view-main-menu-item
        label="Nachrichten"
        link="/messages"
        icon="message"
        [badge]="openMessageCount"
      />
      <view-main-menu-group label="Filter">
        <view-main-menu-item label="Zimmer" link="/filter/rooms" icon="meeting_room" />
        <view-main-menu-item label="Workflow" link="/filter/workflow" icon="account_tree" />
      </view-main-menu-group>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button aria-label="Back" (click)="goBack()">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <span>{{ title() }}</span>
      <span class="app-toolbar-spacer"></span>
      <button mat-icon-button aria-label="Search">
        <mat-icon>search</mat-icon>
      </button>
    </mat-toolbar>
    <div class="app-outlet">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
