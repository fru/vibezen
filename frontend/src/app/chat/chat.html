<header class="app-header">
  <button type="button" class="icon-btn" aria-label="Back">
    <svg viewBox="0 0 512 512" aria-hidden="true">
      <path fill="currentColor" d="M353.3 86.7c8.3-8.3 8.3-21.8 0-30.2s-21.8-8.3-30.2 0L119.6 260.1c-8.3 8.3-8.3 21.8 0 30.2l203.5 203.5c8.3 8.3 21.8 8.3 30.2 0s8.3-21.8 0-30.2L164.9 275.2l188.4-188.5z"/>
    </svg>
  </button>
  <div class="peer-avatar">
    <div class="avatar-letter">JD</div>
  </div>
  <div class="peer-title">
    <span class="peer-name">John Doe</span>
    <span class="peer-status">online</span>
  </div>
  <button type="button" class="icon-btn" aria-label="Menu">
    <svg viewBox="0 0 512 512" aria-hidden="true">
      <path fill="currentColor" d="M256 152c22.1 0 40-17.9 40-40s-17.9-40-40-40-40 17.9-40 40 17.9 40 40 40zm0 48c-22.1 0-40 17.9-40 40s17.9 40 40 40 40-17.9 40-40-17.9-40-40-40zm0 128c-22.1 0-40 17.9-40 40s17.9 40 40 40 40-17.9 40-40-17.9-40-40-40z"/>
    </svg>
  </button>
</header>

<main class="chat-content">
  <div class="message-list">
    @for (msg of messages(); track msg.id) {
      <div class="bubble-row" [class.mine]="msg.fromMe">
        <div class="bubble">
          <p class="bubble-text">{{ msg.text }}</p>
          <span class="bubble-meta">
            {{ msg.timestamp }}
            @if (msg.fromMe) {
              @if (msg.status === 'sent') {
                <svg class="tick-icon" viewBox="0 0 512 512" aria-hidden="true">
                  <path fill="currentColor" d="M190 368l-104-104-32 32 136 136 296-296-32-32z"/>
                </svg>
              } @else {
                <svg
                  class="tick-icon"
                  [class.read]="msg.status === 'read'"
                  viewBox="0 0 512 512"
                  aria-hidden="true"
                >
                  <path fill="currentColor" d="M38 252l34-34 122 122 222-222 34 34-256 256z"/>
                  <path fill="currentColor" d="M222 252l34-34 122 122 50-50 34 34-84 84z"/>
                </svg>
              }
            }
          </span>
        </div>
      </div>
    }
  </div>
</main>

<footer class="app-footer">
  <button type="button" class="icon-btn" aria-label="Attach">
    <svg viewBox="0 0 512 512" aria-hidden="true">
      <path fill="currentColor" d="M440 168l-216 216c-29.4 29.4-77 29.4-106.4 0-29.4-29.4-29.4-77 0-106.4l208-208c19.6-19.6 51.3-19.6 70.9 0 19.6 19.6 19.6 51.3 0 70.9L222 317.6c-9.8 9.8-25.7 9.8-35.5 0-9.8-9.8-9.8-25.7 0-35.5l161.8-161.8-17.8-17.8L168.7 264.3c-19.6 19.6-19.6 51.3 0 70.9 19.6 19.6 51.3 19.6 70.9 0l216-216c39.2-39.2 39.2-102.6 0-141.8-39.2-39.2-102.6-39.2-141.8 0l-208 208c-49 49-49 128.3 0 177.3 49 49 128.3 49 177.3 0l216-216-17.8-17.8z"/>
    </svg>
  </button>
  <input
    class="message-input"
    type="text"
    placeholder="Message"
    [ngModel]="draft()"
    (ngModelChange)="draft.set($event)"
    (keyup.enter)="send()"
  />
  <button type="button" class="icon-btn send-btn" (click)="send()" aria-label="Send">
    <svg viewBox="0 0 512 512" aria-hidden="true">
      <path fill="currentColor" d="M435.9 64.9L16.6 252.2c-7.4 3.3-7.3 13.9.1 17.1l111.5 45.8 44.5 145.2c2.2 7.2 11.4 9 16.4 3.2l62.8-72.4 116.6 85.7c5.7 4.2 13.8 1.2 15.6-5.7L477.7 76.3c1.9-7.3-5-13.8-12.1-11.4zM212.1 324.5l-6.4 71.2-25.4-82.8 197.2-178.5L212.1 324.5z"/>
    </svg>
  </button>
</footer>
