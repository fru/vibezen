name: Build and Push to Docker Hub

on:
  push:
    branches: [ "main" ] # Triggers the build whenever you push to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: fru0
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Sets up optimized Docker building tools
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: ./backend # Assumes your C# files & Dockerfile are in a /backend subfolder
        file: ./backend/Dockerfile
        push: true
        tags: |
          fru0/vibe-chat-app:latest
          fru0/vibe-chat-app:1.0.${{ github.run_number }}