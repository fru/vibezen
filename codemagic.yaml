workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - android_keystore
      vars:
        PACKAGE_NAME: "vibe.rueberg.eu"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Install frontend dependencies
        working_directory: frontend
        script: |
          npm ci
      - name: Build Angular web assets
        working_directory: frontend
        script: |
          npm run build
      - name: Sync Capacitor Android
        working_directory: frontend
        script: |
          npx cap sync android
      - name: Build Android debug APK
        working_directory: frontend/android
        script: |
          ./gradlew assembleDebug
    artifacts:
      - frontend/android/app/build/outputs/apk/**/*.apk
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - app_store_connect
        - ios_credentials
      vars:
        PACKAGE_NAME: "vibe.rueberg.eu"
        XCODE_VERSION: "16.2"
        BUNDLE_ID: "vibe.rueberg.eu"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    scripts:
      - name: Install frontend dependencies
        working_directory: frontend
        script: |
          npm ci
      - name: Build Angular web assets
        working_directory: frontend
        script: |
          npm run build
      - name: Sync Capacitor iOS
        working_directory: frontend
        script: |
          npx cap sync ios
      - name: Set Xcode version
        script: |
          xcode-select --switch /Applications/Xcode_$XCODE_VERSION.app
      - name: Build iOS app
        working_directory: frontend/ios/App
        script: |
          xcode-project build \
            --project App.xcodeproj \
            --scheme App \
            --configuration Release \
            --archive
    artifacts:
      - frontend/ios/App/build/ios/**/*.ipa
